<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Registrations</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
    color: #6a1b9a;
}

.container {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

th {
    background: #6a1b9a;
    color: white;
}

tr:hover {
    background: #f1f1f1;
}

.filter {
    margin-top: 10px;
}

select {
    padding: 8px;
}

.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 10px;
}

.card {
    background: #f3e8ff; /* light purple instead of bold */
    color: #4a148c;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    min-height: 70px;
    font-size: 14px;
}

.card h3 {
    margin: 0;
    font-size: 20px;
    font-weight: 600px;
}
@media (max-width: 768px) {
    .stats {
        grid-template-columns: repeat(3, 1fr); /* still 3 in a row */
        gap: 8px;
    }

    .card {
        padding: 10px;
        font-size: 12px;
    }

    .card h3 {
        font-size: 16px;
    }
}
@media (max-width: 600px) {
    h2 {
        font-size: 20px;
    }

    .card h3 {
        font-size: 16px;
    }

    th, td {
        font-size: 14px;
        padding: 8px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Registrations Dashboard</h2>

    <div class="filter">
        <label>Filter by Country:</label>
        <select id="countryFilter">
            <option value="all">All</option>
        </select>
    </div>
    <div class="stats">
        <div class="card">
            <h3 id="total">0</h3>
            <p>Total Registrations</p>
        </div>

        <div class="card">
            <h3 id="accommodationCount">0</h3>
            <p>Need Accommodation</p>
        </div>

        <div class="card">
            <h3 id="countriesCount">0</h3>
            <p>Countries</p>
        </div>
    </div>

    <div style="overflow-x:auto;">
    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Country</th>
                <th>Days</th>
                <th>Accommodation</th>
                <th>TimeStamp</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    </div>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
