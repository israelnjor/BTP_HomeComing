<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTP ACCRA – Admin Login</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --teal: #0d6b6b;
    --teal-dark: #074f4f;
    --orange: #e85c1a;
    --gold-lt: #e8c555;
    --cream: #fdf8f0;
    --white: #ffffff;
    --text-dark: #0a2a2a;
    --text-mid: #2d5a5a;
    --border: #b5d8d8;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background:
        linear-gradient(135deg, rgba(7,79,79,0.88), rgba(88,17,77,0.86)),
        url('PEA.jpeg');
    background-size: cover;
    background-position: center top;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-card {
    width: 100%;
    max-width: 390px;
    background: rgba(255,255,255,0.96);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.28);
}

.login-header {
    background: var(--teal-dark);
    color: var(--white);
    text-align: center;
    padding: 28px 22px;
}

.logo-badge {
    width: 76px;
    height: 76px;
    margin: 0 auto 12px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 4px rgba(232,197,85,0.35);
}

.logo-badge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.login-header p {
    margin: 0 0 6px;
    color: var(--gold-lt);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.login-header h2 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    line-height: 1.1;
}

.login-header span {
    color: var(--gold-lt);
}

.login-body {
    padding: 24px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 6px;
}

input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 11px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    background: #f5fafa;
    color: var(--text-dark);
}

input:focus {
    border-color: var(--teal);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(13,107,107,0.12);
}

button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 8px 24px rgba(7,79,79,0.28);
}

button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.message {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    color: var(--orange);
    min-height: 18px;
}

.footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 16px;
}

@media (max-width: 480px) {
    .login-header h2 {
        font-size: 24px;
    }

    .login-body {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="login-header">
        <div class="logo-badge">
            <img src="logo.png" alt="BTP Logo">
        </div>
        <p>Born To Prophesy · Accra</p>
        <h2>Home<span>Coming</span><br>Admin Login</h2>
    </div>

    <div class="login-body">

        <div class="input-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>

        <button id="loginBtn">Login to Dashboard</button>

        <p id="message" class="message"></p>

        <p class="footer-note">Authorized access only · Session expires after 15 minutes</p>

    </div>
</div>

<script type="module" src="login.js"></script>

</body>
</html>
